#cloud-config
package_upgrade: false
write_files:
  - path: /opt/setup-datadisk.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail
      LOG=/var/log/rocketmq-setup.log
      exec >>"$LOG" 2>&1
      echo "=== [$(date)] data disk setup start ==="
      # Standard_D4s_v6 uses the NVMe interface; data disks are not exposed via
      # /dev/disk/azure/scsi1/lunX. Detect the unused data disk dynamically:
      # it is a whole disk (TYPE=disk) that is not the OS/root disk, not the
      # cd-rom, and currently has no mountpoints anywhere in its device tree.
      ROOT_SRC=$(findmnt -no SOURCE /)
      ROOT_DISK=$(lsblk -no PKNAME "$ROOT_SRC" | head -1)
      DISK=""
      for i in $(seq 1 60); do
        for dev in $(lsblk -dn -o NAME,TYPE | awk '$2=="disk"{print $1}'); do
          [ "$dev" = "$ROOT_DISK" ] && continue
          case "$dev" in sr*) continue;; esac
          MNTS=$(lsblk -n -o MOUNTPOINT "/dev/$dev" | tr -d ' \n')
          if [ -z "$MNTS" ]; then
            DISK="/dev/$dev"
            break
          fi
        done
        [ -n "$DISK" ] && break
        echo "waiting for data disk ($i)..."; sleep 3
      done
      if [ -z "$DISK" ]; then
        echo "ERROR: data disk not found"; lsblk; exit 1
      fi
      echo "data disk detected: $DISK"
      # create a single GPT partition if none exists
      if [ -z "$(lsblk -n -o NAME "$DISK" | tail -n +2)" ]; then
        echo "partitioning $DISK"
        parted -s "$DISK" mklabel gpt
        parted -s "$DISK" mkpart primary xfs 0% 100%
        sleep 3
        partprobe "$DISK" || true
        sleep 2
      fi
      # resolve the first partition device (handles both sdX1 and nvmeXnYp1)
      PART="/dev/$(lsblk -n -o NAME "$DISK" | tail -n +2 | head -1 | sed 's/[^[:alnum:]]//g')"
      for i in $(seq 1 20); do [ -b "$PART" ] && break; sleep 2; done
      echo "data partition: $PART"
      # format only if no filesystem present
      if ! blkid "$PART" >/dev/null 2>&1; then
        echo "formatting $PART as xfs"
        mkfs.xfs -f "$PART"
      fi
      mkdir -p /datadisk
      UUID=$(blkid -s UUID -o value "$PART")
      echo "data disk UUID=$UUID"
      if ! grep -q "$UUID" /etc/fstab; then
        echo "UUID=$UUID /datadisk xfs defaults,nofail 0 2" >> /etc/fstab
      fi
      mount -a
      echo "=== data disk mounted at /datadisk ==="
      df -h /datadisk
  - path: /opt/install-rocketmq.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail
      LOG=/var/log/rocketmq-setup.log
      exec >>"$LOG" 2>&1
      echo "=== [$(date)] rocketmq install start ==="
      RMQ_VERSION=4.9.7
      RMQ_HOME=/opt/rocketmq-${RMQ_VERSION}
      # update OS to latest 9.x and install dependencies
      dnf -y update
      dnf -y install java-11-openjdk-headless wget unzip
      # download RocketMQ 4.9.7
      cd /opt
      if [ ! -d "$RMQ_HOME" ]; then
        wget -q https://archive.apache.org/dist/rocketmq/${RMQ_VERSION}/rocketmq-all-${RMQ_VERSION}-bin-release.zip -O rocketmq.zip
        unzip -q rocketmq.zip
        mv rocketmq-all-${RMQ_VERSION}-bin-release "$RMQ_HOME"
        rm -f rocketmq.zip
      fi
      # data/log directories on the mounted data disk
      mkdir -p /datadisk/rocketmq/namesrv/logs
      mkdir -p /datadisk/rocketmq/namesrv/kvstore
      # namesrv start wrapper (resolves JAVA_HOME dynamically)
      cat > ${RMQ_HOME}/bin/start-nameserver.sh <<'EOS'
      #!/bin/bash
      export JAVA_HOME=$(dirname "$(dirname "$(readlink -f "$(command -v java)")")")
      export ROCKETMQ_HOME=__RMQ_HOME__
      exec "$ROCKETMQ_HOME/bin/mqnamesrv" -c "$ROCKETMQ_HOME/conf/namesrv.properties"
      EOS
      sed -i "s|__RMQ_HOME__|${RMQ_HOME}|g" ${RMQ_HOME}/bin/start-nameserver.sh
      chmod +x ${RMQ_HOME}/bin/start-nameserver.sh
      # minimal NameServer config (defaults: listenPort 9876)
      cat > ${RMQ_HOME}/conf/namesrv.properties <<EOS
      listenPort=9876
      kvConfigPath=/datadisk/rocketmq/namesrv/kvstore/kvConfig.json
      EOS
      # redirect namesrv logs to data disk
      if [ -f ${RMQ_HOME}/conf/logback_namesrv.xml ]; then
        sed -i 's|\${user.home}/logs/rocketmqlogs|/datadisk/rocketmq/namesrv/logs|g' ${RMQ_HOME}/conf/logback_namesrv.xml
      fi
      # systemd service
      cat > /etc/systemd/system/rocketmq-nameserver.service <<EOS
      [Unit]
      Description=Apache RocketMQ NameServer ${RMQ_VERSION}
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      ExecStart=${RMQ_HOME}/bin/start-nameserver.sh
      Restart=on-failure
      RestartSec=10
      User=root
      LimitNOFILE=655350

      [Install]
      WantedBy=multi-user.target
      EOS
      systemctl daemon-reload
      systemctl enable rocketmq-nameserver.service
      systemctl start rocketmq-nameserver.service
      echo "=== rocketmq nameserver installed and started ==="
      systemctl --no-pager status rocketmq-nameserver.service || true
runcmd:
  - [ bash, /opt/setup-datadisk.sh ]
  - [ bash, /opt/install-rocketmq.sh ]
